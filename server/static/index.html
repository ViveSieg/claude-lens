<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Lens</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css" />

  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true">
          <!-- camera-lens metaphor: outer ring + inner aperture + coral focus dot + glint -->
          <circle cx="20" cy="20" r="16" fill="none" stroke="#141413" stroke-width="1.6"/>
          <circle cx="20" cy="20" r="11" fill="none" stroke="#cc785c" stroke-width="1.4"/>
          <circle cx="20" cy="20" r="5" fill="#cc785c"/>
          <circle cx="16.5" cy="16.5" r="1.6" fill="#faf9f5"/>
        </svg>
        <div class="brand-text">
          <div class="brand-title">Claude Lens</div>
          <div class="brand-sub">see Claude clearly</div>
        </div>
      </div>

      <div class="status-row">
        <span id="ws-dot" class="dot dot-pending"></span>
        <span id="ws-label" class="status-label">connecting…</span>
      </div>

      <div class="section-label">Feeds</div>
      <div id="session-list" class="session-list"></div>

      <div class="section-label" style="margin-top:auto">On this page</div>
      <nav id="toc" class="toc"></nav>
    </aside>

    <main class="feed">
      <header class="feed-header">
        <div class="feed-title-wrap">
          <h1 id="session-title" class="feed-title"></h1>
          <span id="session-meta" class="feed-meta">— no messages yet —</span>
        </div>
        <div class="feed-actions">
          <button id="btn-clear" class="ghost-btn" title="Clear this session">Clear</button>
          <button id="btn-copy-all" class="ghost-btn" title="Copy all markdown">Copy all</button>
          <button id="btn-scroll" class="ghost-btn" title="Scroll to bottom">↓ Bottom</button>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <form id="input-form" class="input-bar" autocomplete="off">
        <input id="input-field" type="text" placeholder="Type a message back to the terminal…" />
        <button type="submit" class="send-btn">Send</button>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
